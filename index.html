<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URCC | University Research Collaboration Center</title>
    <meta name="description" content="University Research Collaboration Center - Empowering research collaboration across boundaries.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.dataset.theme = 'light';
        }
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <div class="brand-icon">
                    <i class="fa-solid fa-atom"></i>
                </div>
                <h2>URCC.</h2>
            </div>
            
            <div class="role-selector">
                <label for="role-select">Current Role</label>
                <select id="role-select">
                    <option value="student">Student Researcher</option>
                    <option value="faculty">Faculty Member</option>
                    <option value="external">External Researcher</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>

            <nav class="nav-menu" id="nav-menu">
                <!-- Nav items injected via JS based on role -->
            </nav>

            <div class="user-profile-widget">
                <img src="https://ui-avatars.com/api/?name=Alex+Doe&background=3b82f6&color=fff" alt="User Profile" class="avatar">
                <div class="user-info">
                    <span class="user-name">Alex Doe</span>
                    <span class="user-role">Student</span>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="header-search">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" placeholder="Search publications, researchers, or projects...">
                </div>
                <div class="header-actions">
                    <button class="icon-btn tooltip" id="theme-toggle">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <button class="icon-btn tooltip">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge">3</span>
                    </button>
                    <button class="icon-btn tooltip">
                        <i class="fa-regular fa-envelope"></i>
                    </button>
                </div>
            </header>

            <!-- Dynamic View Container -->
            <div id="view-container" class="view-container">
                <!-- Views will be injected here by app.js -->
            </div>
        </main>
    </div>

    <!-- GLOBAL MODALS -->
    <div class="modal-overlay d-none fade-in" id="post-modal">
        <div class="modal-content glass slide-up">
            <div class="modal-header">
                <h2>Post Research Opportunity</h2>
                <button class="icon-btn" id="close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="post-opportunity-form">
                    <div class="form-group">
                        <label>Opportunity Title</label>
                        <input type="text" placeholder="e.g. Research Assistant for NLP Model Training" required>
                    </div>
                    <div class="form-group">
                        <label>Detailed Description</label>
                        <textarea rows="4" placeholder="Describe objectives, scope, and expected outcomes..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Required Skills (comma separated)</label>
                        <input type="text" placeholder="e.g. Python, PyTorch, Linguistics" required>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-outline" id="cancel-modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Publish Opportunity</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <!-- ==============================================
         STUDENT TEMPLATES
         ============================================== -->

    <template id="tpl-student-dashboard">
        <div class="page-header slide-in">
            <div>
                <h1>Student Dashboard</h1>
                <p>Welcome back! Discover collaborators and manage your research journey.</p>
            </div>
            <button class="btn btn-primary"><i class="fa-solid fa-wand-magic-sparkles"></i> Get Recommendations</button>
        </div>

        <div class="dashboard-grid fade-in">
            <div class="stats-row">
                <div class="stat-card glass flex-col">
                    <span class="stat-title">Profile Match Score</span>
                    <div class="stat-value highlight-gradient">87%</div>
                    <span class="stat-desc">+5% since last update</span>
                </div>
                <div class="stat-card glass flex-col">
                    <span class="stat-title">Requests Sent</span>
                    <div class="stat-value">12</div>
                    <span class="stat-desc">4 Pending, 6 Accepted</span>
                </div>
                <div class="stat-card glass flex-col">
                    <span class="stat-title">Response Rate</span>
                    <div class="stat-value">83%</div>
                    <span class="stat-desc">Avg 2 days wait</span>
                </div>
            </div>

            <div class="two-col-layout">
                <div class="card glass">
                    <div class="card-header">
                        <h3>Recommended Projects</h3>
                        <a href="#" class="view-all" onclick="document.querySelector('[data-view=\\'opportunities\\']').click()">View All</a>
                    </div>
                    <div class="list-container" id="student-projects"></div>
                </div>

                <div class="card glass">
                    <div class="card-header">
                        <h3>Top Collaborator Matches</h3>
                        <a href="#" class="view-all" onclick="document.querySelector('[data-view=\\'find-collab\\']').click()">Find More</a>
                    </div>
                    <div class="list-container" id="student-collaborators"></div>
                </div>
            </div>
            
            <div class="card glass">
                <div class="card-header">
                    <h3>Skill Gap Analysis</h3>
                    <button class="btn btn-outline btn-sm" onclick="document.querySelector('[data-view=\\'analytics\\']').click()">View Details</button>
                </div>
                <div class="skills-chart">
                    <div class="skill-bar-container">
                        <div class="skill-info"><span>Machine Learning</span> <span>Your level vs Required</span></div>
                        <div class="progress-track"><div class="progress-fill gradient-1" style="width: 70%;"></div></div>
                    </div>
                    <div class="skill-bar-container">
                        <div class="skill-info"><span>Data Visualization</span> <span>Your level vs Required</span></div>
                        <div class="progress-track"><div class="progress-fill gradient-2" style="width: 40%;"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-student-find-collab">
        <div class="page-header slide-in">
            <div>
                <h1>Find Collaborators</h1>
                <p>Search for internal peers or faculty members to collaborate with on projects.</p>
            </div>
        </div>
        <div class="dashboard-grid fade-in">
            <div class="card glass search-card">
                <div class="advanced-search">
                    <div class="search-input-group">
                        <i class="fa-solid fa-search"></i>
                        <input type="text" placeholder="Search by research area, skills, or department..." class="large-input">
                        <button class="btn btn-primary">Search</button>
                    </div>
                    <div class="search-filters">
                        <select class="filter-select"><option>Any Role</option><option>Faculty</option><option>Peer (Student)</option></select>
                        <select class="filter-select"><option>Any Department</option><option>Computer Science</option><option>Physics</option></select>
                    </div>
                </div>
            </div>
            <div class="grid-cards" id="student-search-results"></div>
        </div>
    </template>

    <template id="tpl-student-opportunities">
        <div class="page-header slide-in">
            <div>
                <h1>Research Opportunities</h1>
                <p>Browse open projects, funding sources, and research assistant positions.</p>
            </div>
        </div>
        <div class="dashboard-grid fade-in">
            <div class="card glass search-card" style="padding: 16px;">
                <div class="filter-pills">
                    <span class="pill active">All Available</span>
                    <span class="pill">High Match Score</span>
                    <span class="pill">Recently Added</span>
                    <span class="pill">Saved</span>
                </div>
            </div>
            <div class="list-container" id="student-opportunity-list"></div>
        </div>
    </template>

    <template id="tpl-student-analytics">
        <div class="page-header slide-in">
            <div>
                <h1>My Analytics</h1>
                <p>Track your collaboration success and personal growth.</p>
            </div>
        </div>
        <div class="dashboard-grid fade-in">
            <div class="stats-row">
                <div class="stat-card glass flex-col">
                    <span class="stat-title">Applications</span>
                    <div class="stat-value text-primary">24</div>
                </div>
                <div class="stat-card glass flex-col">
                    <span class="stat-title">Acceptance Rate</span>
                    <div class="stat-value text-success">35%</div>
                </div>
                <div class="stat-card glass flex-col">
                    <span class="stat-title">Average Wait Time</span>
                    <div class="stat-value text-warning">2 Days</div>
                </div>
            </div>
            <div class="card glass">
                <div class="card-header">
                    <h3>Comprehensive Skill Gap Analysis</h3>
                </div>
                <div class="skills-chart">
                    <div class="skill-bar-container"><div class="skill-info"><span>Python</span> <span>90%</span></div><div class="progress-track"><div class="progress-fill gradient-1" style="width: 90%;"></div></div></div>
                    <div class="skill-bar-container"><div class="skill-info"><span>PyTorch</span> <span>80%</span></div><div class="progress-track"><div class="progress-fill gradient-2" style="width: 80%;"></div></div></div>
                    <div class="skill-bar-container"><div class="skill-info"><span>C++</span> <span>45%</span></div><div class="progress-track"><div class="progress-fill gradient-3" style="width: 45%;"></div></div></div>
                    <div class="skill-bar-container"><div class="skill-info"><span>Deep Learning</span> <span>60%</span></div><div class="progress-track"><div class="progress-fill gradient-1" style="width: 60%;"></div></div></div>
                </div>
            </div>
        </div>
    </template>


    <!-- ==============================================
         FACULTY TEMPLATES
         ============================================== -->

    <template id="tpl-faculty-dashboard">
        <div class="page-header slide-in">
            <div>
                <h1>Faculty Dashboard</h1>
                <p>Overview of your projects and recent collaboration requests.</p>
            </div>
            <button class="btn btn-primary" id="btn-post-project"><i class="fa-solid fa-plus"></i> Post Opportunity</button>
        </div>

        <div class="dashboard-grid fade-in">
            <div class="card glass">
                <div class="card-header">
                    <h3>Your Active Opportunities</h3>
                    <a href="#" class="view-all" onclick="document.querySelector('[data-view=\\'my-projects\\']').click()">Manage All</a>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Project Title</th>
                                <th>Applicants</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="faculty-dashboard-projects"></tbody>
                    </table>
                </div>
            </div>
            <div class="card glass">
                <div class="card-header">
                    <h3>Recent Pending Requests</h3>
                    <a href="#" class="view-all" onclick="document.querySelector('[data-view=\\'requests\\']').click()">Review All</a>
                </div>
                <div class="requests-container" id="faculty-dashboard-requests"></div>
            </div>
        </div>
    </template>

    <template id="tpl-faculty-my-projects">
        <div class="page-header slide-in">
            <div>
                <h1>My Projects</h1>
                <p>Detailed view and management of all your research opportunities.</p>
            </div>
            <button class="btn btn-primary" id="btn-post-project-2"><i class="fa-solid fa-plus"></i> Create New</button>
        </div>
        <div class="card glass fade-in">
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Project Title</th>
                            <th>Description Snippet</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="faculty-all-projects"></tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="tpl-faculty-requests">
        <div class="page-header slide-in">
            <div>
                <h1>Review Requests</h1>
                <p>Manage applications from students and external collaborators.</p>
            </div>
            <div class="filter-pills">
                <span class="pill active">Pending</span>
                <span class="pill">Accepted</span>
                <span class="pill">On Hold</span>
            </div>
        </div>
        <div class="dashboard-grid fade-in" id="faculty-all-requests">
            <!-- Populated via JS -->
        </div>
    </template>


    <!-- ==============================================
         EXTERNAL TEMPLATES
         ============================================== -->

    <template id="tpl-external-discovery">
        <div class="page-header slide-in">
            <div>
                <h1>Collaborator Discovery</h1>
                <p>Find university faculty and research groups for external collaboration.</p>
            </div>
        </div>
        <div class="dashboard-grid fade-in">
            <div class="card glass search-card">
                <div class="advanced-search">
                    <div class="search-input-group">
                        <i class="fa-solid fa-search"></i>
                        <input type="text" placeholder="Search by research area, department, or expertise..." class="large-input">
                        <button class="btn btn-primary">Search</button>
                    </div>
                </div>
            </div>
            <div class="grid-cards" id="external-faculty-results"></div>
        </div>
    </template>

    <template id="tpl-external-network">
        <div class="page-header slide-in">
            <div>
                <h1>My Network</h1>
                <p>Faculty members and groups you are currently collaborating with.</p>
            </div>
        </div>
        <div class="card glass fade-in" style="min-height:300px;">
            <div class="list-container" id="external-network-list"></div>
        </div>
    </template>

    <template id="tpl-external-messages">
        <div class="page-header slide-in">
            <div>
                <h1>Messages</h1>
                <p>Communicate with your research partners.</p>
            </div>
        </div>
        <div class="dashboard-grid fade-in" style="display: grid; grid-template-columns: 300px 1fr; gap: 24px;">
            <div class="card glass" style="padding: 0; overflow: hidden; height: 500px;">
                <div style="padding: 16px; border-bottom: 1px solid var(--border-color);">
                    <input type="text" placeholder="Search chats..." style="width: 100%; padding: 8px; background: var(--glass-reverse-20); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 8px;">
                </div>
                <div id="message-threads" style="overflow-y: auto; height: 100%;"></div>
            </div>
            <div class="card glass" style="height: 500px; display: flex; flex-direction: column;">
                <div class="card-header" style="border-bottom: 1px solid var(--border-color); padding-bottom: 16px; margin-bottom: 0;">
                    <h3 id="chat-title">Select a chat</h3>
                </div>
                <div style="flex-grow: 1; padding: 16px; display: flex; flex-direction: column; justify-content: flex-end; opacity: 0.5;" id="chat-window">
                    <p style="text-align: center;">No message selected</p>
                </div>
                <div style="border-top: 1px solid var(--border-color); padding-top: 16px; display: flex; gap: 8px;">
                    <input type="text" placeholder="Type a message..." style="flex-grow: 1; padding: 12px; background: var(--glass-reverse-20); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 8px;">
                    <button class="btn btn-primary">Send</button>
                </div>
            </div>
        </div>
    </template>


    <!-- ==============================================
         ADMINISTRATION TEMPLATES
         ============================================== -->

    <template id="tpl-admin-reports">
        <div class="page-header slide-in">
            <div>
                <h1>System Reports</h1>
                <p>Overview of university research collaboration metrics.</p>
            </div>
            <button class="btn btn-outline"><i class="fa-solid fa-download"></i> Export Report</button>
        </div>
        <div class="dashboard-grid fade-in">
            <div class="stats-row">
                <div class="stat-card glass flex-col"><span class="stat-title">Total Active Projects</span><div class="stat-value">142</div><span class="stat-desc text-success"><i class="fa-solid fa-arrow-trend-up"></i> 12% increase</span></div>
                <div class="stat-card glass flex-col"><span class="stat-title">Successful Matches</span><div class="stat-value">845</div><span class="stat-desc">Across all departments</span></div>
                <div class="stat-card glass flex-col"><span class="stat-title">Avg Response Time</span><div class="stat-value">1.8 Days</div><span class="stat-desc text-success"><i class="fa-solid fa-arrow-trend-down"></i> Faster by 0.4d</span></div>
            </div>
            <div class="two-col-layout">
                <div class="card glass">
                    <div class="card-header"><h3>Collaboration Network Density</h3></div>
                    <div class="chart-placeholder flex-center"><div class="mock-network-graph"><i class="fa-solid fa-diagram-project fa-4x" style="color: var(--primary); opacity: 0.5;"></i></div></div>
                </div>
                <div class="card glass">
                    <div class="card-header"><h3>Recent System Logs</h3></div>
                    <ul class="activity-feed" id="admin-recent-logs" style="list-style: none; display: flex; flex-direction: column; gap: 16px;"></ul>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-admin-users">
        <div class="page-header slide-in">
            <div>
                <h1>User Management</h1>
                <p>View, suspend, or approve accounts across the platform.</p>
            </div>
        </div>
        <div class="card glass fade-in">
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>User Name</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-users-table"></tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="tpl-admin-settings">
        <div class="page-header slide-in">
            <div>
                <h1>Platform Settings</h1>
                <p>Configure matchmaking algorithms and global permissions.</p>
            </div>
            <button class="btn btn-primary">Save Changes</button>
        </div>
        <div class="card glass fade-in" style="max-width: 800px;">
            <div class="form-group">
                <label>Matchmaking Threshold (%)</label>
                <input type="number" value="70">
            </div>
            <div class="form-group" style="margin-top:20px; flex-direction:row; align-items:center; justify-content:space-between;">
                <div>
                    <label style="font-size:1.1rem; color:var(--text-primary);">Allow External Registrations</label>
                    <p style="font-size:0.85rem; color:var(--text-secondary);">Enable external entities to create accounts freely.</p>
                </div>
                <div style="background:var(--primary); width:48px; height:24px; border-radius:12px; position:relative; cursor:pointer;">
                    <div style="background:var(--text-primary); width:20px; height:20px; border-radius:50%; position:absolute; top:2px; right:2px;"></div>
                </div>
            </div>
            <div class="form-group" style="margin-top:20px; flex-direction:row; align-items:center; justify-content:space-between;">
                <div>
                    <label style="font-size:1.1rem; color:var(--text-primary);">Auto-Archive Inactive Projects</label>
                    <p style="font-size:0.85rem; color:var(--text-secondary);">Projects inactive for 90 days are archived.</p>
                </div>
                <div style="background:var(--glass-20); width:48px; height:24px; border-radius:12px; position:relative; cursor:pointer;">
                    <div style="background:var(--text-primary); width:20px; height:20px; border-radius:50%; position:absolute; top:2px; left:2px;"></div>
                </div>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
